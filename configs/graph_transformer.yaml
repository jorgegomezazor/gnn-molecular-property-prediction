# configs/graph_transformer.yaml  —  GPS (Rampášek et al., NeurIPS 2022)

defaults:
  - base

model:
  name: graph_transformer
  hidden_dim: 64
  num_layers: 4
  num_heads: 4
  local_gnn: gin            # local message-passing: gin | gat | mpnn
  global_attn: transformer  # global attention: transformer
  dropout: 0.1
  attn_dropout: 0.1
  readout: mean
  pe_type: none             # laplacian PE disabled (precomputation needed for efficiency)
  pe_dim: 8                 # dim of Laplacian PE (unused when pe_type=none)
  batch_norm: true
